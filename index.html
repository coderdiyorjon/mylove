<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siz uchun maxsus...</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f050d;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Matrix Canvas */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Click Overlay */
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 5, 13, 0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: opacity 0.8s ease;
        }

        .heart-pulse {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: #ff69b4;
            margin-bottom: 20px;
            text-shadow: 0 0 25px rgba(255, 105, 180, 0.8);
            animation: pulseHeart 1.5s infinite;
        }

        #startOverlay p {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            color: #ffb6c1;
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.5);
            letter-spacing: 2px;
            text-align: center;
            padding: 0 20px;
        }

        @keyframes pulseHeart {
            0% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.15);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        #contentContainer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Countdown */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: clamp(4rem, 15vw, 10rem);
            color: #ffb6c1;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.6), 0 0 40px rgba(255, 20, 147, 0.4);
            display: none;
        }

        @keyframes countdownAnim {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
                filter: blur(10px);
            }

            40% {
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 1;
                filter: blur(0px);
            }

            60% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                filter: blur(0px);
            }

            100% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0;
                filter: blur(8px);
            }
        }

        /* Text Container */
        #wordContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 25;
            padding: 0 20px;
        }

        .word {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 10vw, 8rem);
            color: #fff0f5;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.8), 0 0 30px rgba(255, 20, 147, 0.6);
            opacity: 0;
            display: inline-block;
            line-height: 1.2;
        }

        @keyframes appearDisappear {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
                filter: blur(12px);
            }

            30% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }

            70% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }

            100% {
                opacity: 0;
                transform: scale(1.1) translateY(-20px);
                filter: blur(10px);
            }
        }

        /* Video Player 16:9 Setup */
        #videoWrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%) scale(0.9);
            width: 90vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            /* Aynan gorizontal 16:9 videolar uchun */
            height: auto;
            display: none;
            opacity: 0;
            pointer-events: auto;
            z-index: 20;

            border-radius: 20px;
            padding: 8px;
            /* Ramka effekti sig'ishi uchun kichik bo'shliq */
            background: rgba(255, 182, 193, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 105, 180, 0.2),
                0 0 30px rgba(255, 105, 180, 0.3);
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #videoWrapper.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #myVideo {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            /* 16:9 ramkani to'liq, asliga mos qoplab oladi */
            border-radius: 14px;
            background: #000;
        }

        #muteBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            outline: none;
            z-index: 25;
        }

        #muteBtn:hover {
            background: rgba(255, 105, 180, 0.6);
            transform: scale(1.1) rotate(5deg);
        }

        #matterContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            pointer-events: none;
        }

        .physics-item {
            position: absolute;
            cursor: grab;
            user-select: none;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .physics-item:active {
            cursor: grabbing;
        }

        .romantic-text {
            font-family: 'Dancing Script', cursive;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 182, 193, 0.4);
            border-radius: 50%;
            color: #fff0f5;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(255, 105, 180, 0.8);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.2);
        }
    </style>
</head>

<body>
    <div id="startOverlay">
        <div class="heart-pulse">
            <i class="fa-solid fa-heart"></i>
        </div>
        <p>Ochish uchun bosing...</p>
    </div>

    <canvas id="matrixCanvas"></canvas>
    <div id="matterContainer"></div>

    <div id="contentContainer">
        <div id="countdown">3</div>
        <div id="wordContainer"></div>

        <div id="videoWrapper">
            <video id="myVideo" autoplay loop playsinline></video>
            <button id="muteBtn"><i class="fa-solid fa-volume-high"></i></button>
        </div>
    </div>

    <!-- Background Audio -->
    <audio id="bgAudio" loop preload="auto"></audio>

    <script>
        // =========================================================================
        // SOZLAMALAR (Shu yerdagi ma'lumotlarni o'zingizga qarab o'zgartiring)
        // =========================================================================

        const myMessage = "Siz xohlagan gap...";

        // Google Drive havolalari (Video va Musiqa "Hamma ko'ra oladigan - Public" qilingan diledan linki bo'lishi shart!)
        const googleDriveVideoLink = "https://drive.google.com/file/d/1mCB7Tsoiz2KE1iwXNnUo8jGSS219j_HJ/view?usp=sharing";

        const googleDriveAudioLink = "https://drive.google.com/file/d/1-Yy-v254Lz89w6E3k4jr6re0CCvvyvQh/view?usp=sharing";

        // =========================================================================

        // Google Drive havolasini avtomatik direct-play (to'g'ridan-to'g'ri o'qiladigan) rejimiga o'tkazuvchi qism:
        function getDriveDirectLink(url) {
            if (!url || url.includes("SIZ_")) return "";
            let fileId = "";
            const match1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (match1) fileId = match1[1];
            const match2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match2) fileId = match2[1];

            return fileId ? `https://drive.google.com/uc?export=download&id=${fileId}` : url;
        }

        function getDriveIframeLink(url) {
            if (!url || url.includes("SIZ_")) return "";
            let fileId = "";
            const match1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (match1) fileId = match1[1];
            const match2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match2) fileId = match2[1];

            return fileId ? `https://drive.google.com/file/d/${fileId}/preview` : url;
        }

        const overlay = document.getElementById('startOverlay');
        const bgAudio = document.getElementById('bgAudio');
        let myVideo = document.getElementById('myVideo');
        const muteBtn = document.getElementById('muteBtn');
        const countdownEl = document.getElementById('countdown');
        const wordContainer = document.getElementById('wordContainer');
        const videoWrapper = document.getElementById('videoWrapper');

        const isDriveVideo = (googleDriveVideoLink || "").includes('drive.google.com');

        // Agar video Google Drive orqali ulanayotgan bo'lsa (Google to'g'ridan to'g'ri o'qishni bloklamoqda):
        if (isDriveVideo) {
            const iframe = document.createElement('iframe');
            iframe.src = getDriveIframeLink(googleDriveVideoLink);
            iframe.width = "100%";
            iframe.height = "100%";
            iframe.style.border = "none";
            iframe.style.borderRadius = "14px";
            iframe.allow = "autoplay";
            myVideo.replaceWith(iframe);
            myVideo = iframe;

            muteBtn.style.display = 'none'; // Iframe orqali ovozni to'g'ridan to'g'ri boshqarib bo'lmaydi
        } else {
            myVideo.src = getDriveDirectLink(googleDriveVideoLink);
        }

        // Musiqa kichik hajmda bo'lganligi sababli Google bloklamaydi, u <audio> tegi bilan ishlashda davom etadi.
        bgAudio.src = getDriveDirectLink(googleDriveAudioLink);

        overlay.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 800);

            bgAudio.muted = false;

            if (!isDriveVideo) {
                myVideo.muted = false;
                muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                if (myVideo.src) myVideo.play().catch(e => console.log('Video xatosi:', e));
            }

            if (bgAudio.src) bgAudio.play().catch(e => console.log('Audio xatosi (Fayl URL noto\'g\'ri bolishi mumkin):', e));

            startSquareMatrix();
            startSequence();
        });

        if (!isDriveVideo) {
            muteBtn.addEventListener('mousedown', (e) => e.stopPropagation());
            muteBtn.addEventListener('touchstart', (e) => e.stopPropagation());
            muteBtn.addEventListener('click', () => {
                if (myVideo.muted) {
                    myVideo.muted = false;
                    bgAudio.muted = false;
                    muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                } else {
                    myVideo.muted = true;
                    bgAudio.muted = true;
                    muteBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                }
            });
        }

        function startSquareMatrix() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const size = 3;
            const columns = Math.floor(canvas.width / (size * 4));

            const drops = [];
            for (let x = 0; x < columns; x++) {
                drops[x] = Math.random() * canvas.height;
            }

            function draw() {
                ctx.fillStyle = 'rgba(15, 5, 13, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < drops.length; i++) {
                    const x = i * size * 4;
                    const y = drops[i] * size * 2;

                    const rand = Math.random();
                    if (rand > 0.8) ctx.fillStyle = '#ff1493';
                    else if (rand > 0.5) ctx.fillStyle = '#ffb6c1';
                    else ctx.fillStyle = '#ff69b4';

                    ctx.globalAlpha = Math.random() * 0.8 + 0.2;
                    ctx.fillRect(x, y, size, size);
                    ctx.globalAlpha = 1.0;

                    if (y > canvas.height && Math.random() > 0.97) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(draw, 50);

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        function startSequence() {
            countdownEl.style.display = 'block';
            let count = 3;
            countdownEl.innerText = count;
            countdownEl.style.animation = 'countdownAnim 1.2s ease-in-out forwards';

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.style.animation = 'none';
                    void countdownEl.offsetWidth;
                    countdownEl.style.animation = 'countdownAnim 1.2s ease-in-out forwards';
                    countdownEl.innerText = count;
                } else {
                    clearInterval(countInterval);
                    countdownEl.style.display = 'none';
                    startTextSplitter();
                }
            }, 1200);
        }

        function startTextSplitter() {
            const words = myMessage.split(" ");
            let currentIndex = 0;

            function showNextWord() {
                if (currentIndex >= words.length) {
                    showVideoAndPhysics();
                    return;
                }

                const wordSpan = document.createElement('span');
                wordSpan.className = 'word';
                wordSpan.innerText = words[currentIndex];

                wordContainer.innerHTML = '';
                wordContainer.appendChild(wordSpan);

                wordSpan.style.animation = 'appearDisappear 1.8s ease-in-out forwards';

                setTimeout(() => {
                    currentIndex++;
                    showNextWord();
                }, 1800);
            }

            showNextWord();
        }

        function showVideoAndPhysics() {
            videoWrapper.style.display = 'block';
            setTimeout(() => {
                videoWrapper.classList.add('show');
            }, 50);

            setTimeout(() => {
                startAntigravity();
            }, 1200);
        }

        function startAntigravity() {
            const Engine = Matter.Engine,
                Runner = Matter.Runner,
                Bodies = Matter.Bodies,
                Composite = Matter.Composite,
                Mouse = Matter.Mouse,
                MouseConstraint = Matter.MouseConstraint;

            const engine = Engine.create();
            engine.world.gravity.y = 0.15;

            const matterContainer = document.getElementById('matterContainer');
            const objects = [];

            const thickness = 60;
            const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + thickness / 2, window.innerWidth, thickness, { isStatic: true });
            const leftWall = Bodies.rectangle(-thickness / 2, window.innerHeight / 2, thickness, window.innerHeight, { isStatic: true });
            const rightWall = Bodies.rectangle(window.innerWidth + thickness / 2, window.innerHeight / 2, thickness, window.innerHeight, { isStatic: true });
            const ceiling = Bodies.rectangle(window.innerWidth / 2, -thickness / 2, window.innerWidth, thickness, { isStatic: true });

            Composite.add(engine.world, [ground, leftWall, rightWall, ceiling]);

            const mouse = Mouse.create(document.body);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });
            Composite.add(engine.world, mouseConstraint);

            const runner = Runner.create();
            Runner.run(runner, engine);

            const generateObject = () => {
                const rand = Math.random();
                const x = Math.random() * (window.innerWidth - 100) + 50;
                const y = -80;

                const elem = document.createElement('div');
                elem.className = 'physics-item';

                let body;
                if (rand > 0.5) {
                    elem.innerHTML = Math.random() > 0.5 ? '<i class="fa-solid fa-heart"></i>' : '🌸';
                    elem.style.color = '#ff69b4';
                    elem.style.fontSize = `${Math.random() * 1.5 + 1.5}rem`;
                    elem.style.filter = 'drop-shadow(0 0 8px rgba(255,105,180,0.6))';

                    matterContainer.appendChild(elem);
                    const radius = (elem.offsetWidth || 30) / 2;
                    body = Bodies.circle(x, y, radius, { restitution: 0.85, friction: 0.005 });
                } else {
                    const texts = ['Malikam', 'Farishtam', 'Go\'zalim', 'Yagonam', 'Asalim', 'Jonim', '🌸', '💖', '✨'];
                    const txt = texts[Math.floor(Math.random() * texts.length)];
                    elem.innerText = txt;
                    elem.classList.add('romantic-text');

                    const size = txt.length > 2 ? 80 : 50;
                    elem.style.width = `${size}px`;
                    elem.style.height = `${size}px`;

                    matterContainer.appendChild(elem);
                    body = Bodies.circle(x, y, size / 2, { restitution: 0.7, friction: 0.01 });
                }

                Composite.add(engine.world, body);
                objects.push({ body, elem });
            };

            let drops = 0;
            const dropInterval = setInterval(() => {
                generateObject();
                drops++;
                if (drops >= 45) clearInterval(dropInterval);
            }, 350);

            Matter.Events.on(engine, 'afterUpdate', function () {
                for (let i = 0; i < objects.length; i++) {
                    const { body, elem } = objects[i];
                    elem.style.transform = `translate(${body.position.x - elem.offsetWidth / 2}px, ${body.position.y - elem.offsetHeight / 2}px) rotate(${body.angle}rad)`;
                }
            });

            window.addEventListener('resize', () => {
                Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + thickness / 2 });
                Matter.Body.setPosition(rightWall, { x: window.innerWidth + thickness / 2, y: window.innerHeight / 2 });
            });
        }
    </script>
</body>

</html>
